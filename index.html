function adresYukle(e){

var updates={};

var cols=lines[i].split(”,”);

var musNo=noIdx>=0?cols[noIdx].trim():””;

var tel=telIdx>=0?cols[telIdx].trim():””;
var konum=konIdx>=0?parseInt(cols[konIdx])||5:5;
if(musNo)updates[musNo]={adres:adres,tel:tel,konum:konum};
}
var updated=0;
var yeni=ms.map(function(m){
var upd=updates[String(m.id)];
if(upd&&upd.adres){updated++;return Object.assign({},m,upd);}
return m;
});
sMs(yeni);
showT(updated+” musteri adresi guncellendi!”);
}catch(err){showT(“Hata: “+err.message,true);}
};
reader.readAsText(file,“UTF-8”);
e.target.value=””;
}

if(sira===“bakiye”)return liste.slice().sort(function(a,b){var ag=borcDurum(a.m)===“gecikme”?1:0,bg=borcDurum(b.m)===“gecikme”?1:0;if(bg!==ag)return bg-ag;return(b.m.totalOverdue||b.m.borc||0)-(a.m.totalOverdue||a.m.borc||0);});
if(sira===“adres”)return liste.slice().sort(function(a,b){return(a.m.konum||5)-(b.m.konum||5);});
if(sira===“kampanya”){
return liste.slice().sort(function(a,b){
var ak=ks.filter(function(k){return KH[k.kategori].indexOf(a.m.brans)>=0;}).length;
var bk=ks.filter(function(k){return KH[k.kategori].indexOf(b.m.brans)>=0;}).length;
return bk-ak;
});
}
return liste;
}

function adresExcelYukle(e){
var file=e.target.files[0];
if(!file)return;
var reader=new FileReader();
reader.onload=function(ev){
try{
var text=ev.target.result;
var lines=text.split(”\n”);
if(lines.length<2){showT(“Dosya bos!”,true);return;}
var headers=lines[0].split(”,”).map(function(h){return h.trim().replace(new RegExp(String.fromCharCode(34),“g”),””).toLowerCase();});
var noIdx=headers.findIndex(function(h){return h.includes(“no”);});
var adIdx=headers.findIndex(function(h){return h.includes(“adi”)||h.includes(“ad”);});
var adrIdx=headers.findIndex(function(h){return h.includes(“adres”);});
var telIdx=headers.findIndex(function(h){return h.includes(“tel”);});
var konIdx=headers.findIndex(function(h){return h.includes(“konum”);});
if(adrIdx<0){showT(“Adres kolonu bulunamadi!”,true);return;}
var updates={};
for(var i=1;i<lines.length;i++){
var cols=lines[i].split(”,”);
if(cols.length<2)continue;
var musNo=noIdx>=0?cols[noIdx].replace(new RegExp(String.fromCharCode(34),“g”),””).trim():””;
var musAd=adIdx>=0?cols[adIdx].replace(new RegExp(String.fromCharCode(34),“g”),””).trim().toUpperCase():””;
var adres=adrIdx>=0?cols[adrIdx].replace(new RegExp(String.fromCharCode(34),“g”),””).trim():””;
var tel=telIdx>=0?cols[telIdx].replace(new RegExp(String.fromCharCode(34),“g”),””).trim():””;
var konum=konIdx>=0?parseInt(cols[konIdx])||5:5;
if(musNo)updates[musNo]={adres:adres,tel:tel,konum:konum};
else if(musAd)updates[musAd]={adres:adres,tel:tel,konum:konum};
}
var updated=0;
var yeni=ms.map(function(m){
var byNo=updates[String(m.id)];
var byAd=updates[m.ad.toUpperCase().trim()];
var upd=byNo||byAd;
if(upd&&upd.adres){updated++;return Object.assign({},m,upd);}
return m;
});
sMs(yeni);
showT(updated+” musteri adresi guncellendi!”);
}catch(err){showT(“Hata: “+err.message,true);}
};
reader.readAsText(file,“UTF-8”);
e.target.value=””;
}

function borcYapistir(metin){
if(!metin.trim()){showT(“Metin bos!”,true);return;}
try{
var satirlar=metin.trim().split(”\n”);
if(satirlar.length<2){showT(“En az 2 satir!”,true);return;}
var ayrac=satirlar[0].indexOf(”\t”)>=0?”\t”:”,”;
var headers=satirlar[0].split(ayrac).map(function(h){return h.trim().replace(new RegExp(String.fromCharCode(34),“g”),””).toUpperCase();});
var noIdx=headers.findIndex(function(h){return h.includes(“MUSTERI_NO”);});
var balIdx=headers.findIndex(function(h){return h.includes(“TOTAL_BALANCE”);});
var ovdIdx=headers.findIndex(function(h){return h.includes(“OVER_DUE”);});
var blkIdx=headers.findIndex(function(h){return h.includes(“BLOCKING”);});
var vadeIdx=headers.findIndex(function(h){return h.includes(“VADE”);});
if(balIdx<0){showT(“TOTAL_BALANCE kolonu yok!”,true);return;}
if(noIdx<0){showT(“MUSTERI_NO kolonu yok!”,true);return;}
var updates={};
for(var i=1;i<satirlar.length;i++){
var cols=satirlar[i].split(ayrac);
if(cols.length<2)continue;
var musNo=cols[noIdx].replace(new RegExp(String.fromCharCode(34),“g”),””).trim();
var bal=parseFloat(cols[balIdx].replace(new RegExp(String.fromCharCode(34),“g”),””).replace(/,/g,”.”).trim())||0;
var ovd=ovdIdx>=0?(parseFloat(cols[ovdIdx].replace(new RegExp(String.fromCharCode(34),“g”),””).replace(/,/g,”.”).trim())||0):0;
var blk=blkIdx>=0?(parseInt(cols[blkIdx].replace(new RegExp(String.fromCharCode(34),“g”),””).trim())||0):0;
var vadeRaw=vadeIdx>=0?cols[vadeIdx].replace(new RegExp(String.fromCharCode(34),“g”),””).trim():“30”;
var vade=vadeRaw.startsWith(“F”)?30:(parseInt(vadeRaw)||30);
if(musNo)updates[musNo]={borc:bal,totalOverdue:ovd,blocking:blk,vade:vade,borcTarihi:bal>0?today():””};
}
var updated=0;
var yeni=ms.map(function(m){var upd=updates[String(m.id)];if(upd){updated++;return Object.assign({},m,upd);}return m;});
sMs(yeni);setMod(null);
showT(updated+” musteri guncellendi!”);
}catch(err){showT(“Hata: “+err.message,true);}
}
